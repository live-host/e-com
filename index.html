<!DOCTYPE html>
<html lang="bn" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রফেশনাল ই-কমার্স | Google Sheets Powered</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased selection:bg-indigo-500 selection:text-white">

    <nav class="bg-white/80 backdrop-blur-md shadow-sm border-b border-slate-100 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">
            <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer" onclick="window.scrollTo(0,0)">
                <div class="bg-indigo-600 text-white p-2 rounded-lg"><i class="fas fa-store"></i></div>
                <h1 class="text-2xl font-black tracking-tight text-slate-900">Easy<span class="text-indigo-600">Shop</span></h1>
            </div>

            <div class="hidden md:flex flex-1 max-w-lg mx-8 relative">
                <input type="text" id="searchInput" placeholder="পছন্দের পণ্য খুঁজুন..." class="w-full pl-10 pr-4 py-2 bg-slate-100 border-transparent rounded-xl focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all text-sm outline-none">
                <i class="fas fa-search absolute left-3.5 top-2.5 text-slate-400"></i>
            </div>

            <button onclick="toggleCart()" class="relative p-2 text-slate-600 hover:text-indigo-600 transition-colors group">
                <i class="fas fa-shopping-bag text-2xl group-hover:scale-110 transition-transform"></i>
                <span id="cartCount" class="absolute top-0 right-0 bg-rose-500 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-white shadow-sm transform translate-x-1 -translate-y-1">0</span>
            </button>
        </div>
    </nav>

    <div class="md:hidden px-4 py-3 bg-white border-b shadow-sm sticky top-16 z-30">
        <div class="relative">
            <input type="text" id="mobileSearchInput" placeholder="পণ্য খুঁজুন..." class="w-full pl-10 pr-4 py-2 bg-slate-100 rounded-xl focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all text-sm outline-none">
            <i class="fas fa-search absolute left-3.5 top-2.5 text-slate-400"></i>
        </div>
    </div>

    <div class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex space-x-3 overflow-x-auto hide-scroll py-1" id="categoryFilter">
                <button onclick="filterCategory('all', this)" class="category-btn px-5 py-1.5 bg-indigo-600 text-white rounded-full text-sm font-medium whitespace-nowrap shadow-md shadow-indigo-200 transition-all">সব পণ্য</button>
                </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 min-h-[60vh]">
        
        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
            <p class="text-slate-500 font-medium">গুগল শিট থেকে ডেটা লোড হচ্ছে...</p>
        </div>

        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-slate-400">
            <i class="fas fa-box-open text-6xl mb-4 opacity-50"></i>
            <p class="text-lg">কোনো পণ্য পাওয়া যায়নি!</p>
        </div>

        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6 hidden">
            </div>

    </main>

    <footer class="bg-white border-t py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center text-slate-500 text-sm">
            <p>&copy; 2026 EasyShop. সর্বস্বত্ব সংরক্ষিত।</p>
        </div>
    </footer>

    <div id="cartOverlay" onclick="toggleCart()" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden transition-opacity opacity-0"></div>
    
    <div id="cartSidebar" class="fixed right-0 top-0 h-full w-[90%] md:w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-[60] flex flex-col">
        
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white">
            <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                <i class="fas fa-shopping-basket text-indigo-600"></i> আপনার ব্যাগ
            </h2>
            <button onclick="toggleCart()" class="text-slate-400 hover:text-rose-500 transition-colors p-2 rounded-full hover:bg-rose-50">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        
        <div id="cartItems" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50">
            </div>
        
        <div class="border-t border-slate-100 p-6 bg-white shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
            <div class="flex justify-between items-center text-lg font-bold text-slate-800 mb-4">
                <span>সর্বমোট:</span>
                <span id="cartTotal" class="text-indigo-600">৳ ০</span>
            </div>
            <button onclick="checkoutViaWhatsApp()" class="w-full bg-[#25D366] hover:bg-[#1ebd5c] text-white py-3.5 rounded-xl font-bold shadow-lg shadow-green-200 transition-all flex justify-center items-center gap-2 group">
                <i class="fab fa-whatsapp text-xl group-hover:scale-110 transition-transform"></i>
                হোয়াটসঅ্যাপে অর্ডার দিন
            </button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3">
        <i class="fas fa-check-circle text-emerald-400"></i>
        <span class="text-sm font-medium">পণ্য কার্টে যুক্ত হয়েছে!</span>
    </div>

    <script>
        // ==========================================
        // কনফিগারেশন - এখানে আপনার নিজস্ব তথ্য দিন
        // ==========================================
        const SHEET_CSV_URL = 'আপনার_কপি_করা_CSV_লিঙ্কটি_এখানে_দিন'; 
        const WHATSAPP_NUMBER = '8801XXXXXXXXX'; // Country code সহ নম্বর দিন
        
        // গ্লোবাল স্টেট
        let products = [];
        let filteredProducts = [];
        let cart = JSON.parse(localStorage.getItem('easyShopCart')) || [];

        // DOM লোড হলে ইনিশিয়ালাইজেশন
        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
            updateCartUI();
            
            // সার্চ লিসেনার
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('mobileSearchInput').addEventListener('input', handleSearch);
        });

        // 1. গুগল শিট থেকে ডেটা ফেচ (PapaParse)
        function fetchData() {
            if(!SHEET_CSV_URL || SHEET_CSV_URL === 'আপনার_কপি_করা_CSV_লিঙ্কটি_এখানে_দিন') {
                document.getElementById('loader').innerHTML = '<p class="text-rose-500 font-bold">দয়া করে কোডে CSV লিঙ্ক যুক্ত করুন!</p>';
                return;
            }

            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    // শুধু সেই রো গুলো নিবে যেগুলোতে id, name এবং price আছে
                    products = results.data.filter(item => item.id && item.name && item.price);
                    filteredProducts = [...products];
                    
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('productGrid').classList.remove('hidden');
                    
                    renderProducts(filteredProducts);
                    generateCategoryFilters();
                },
                error: function(error) {
                    document.getElementById('loader').innerHTML = '<p class="text-rose-500 font-bold">ডেটা লোড করতে সমস্যা হয়েছে। লিঙ্ক ঠিক আছে কিনা চেক করুন।</p>';
                }
            });
        }

        // 2. প্রোডাক্ট রেন্ডার করা
        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            const emptyState = document.getElementById('emptyState');
            
            grid.innerHTML = '';

            if (items.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            grid.classList.remove('hidden');

            grid.innerHTML = items.map(product => `
                <div class="bg-white rounded-2xl p-3 border border-slate-100 shadow-sm hover:shadow-xl hover:border-indigo-100 transition-all duration-300 group flex flex-col h-full">
                    <div class="relative w-full pt-[100%] rounded-xl overflow-hidden bg-slate-100 mb-3">
                        <img src="${product.image || 'https://via.placeholder.com/300?text=No+Image'}" alt="${product.name}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" loading="lazy" onerror="this.src='https://via.placeholder.com/300?text=Image+Error'">
                        ${product.category ? `<span class="absolute top-2 left-2 bg-white/90 backdrop-blur-sm px-2 py-1 rounded text-[10px] font-bold text-slate-700 uppercase tracking-wider shadow-sm">${product.category}</span>` : ''}
                    </div>
                    
                    <div class="flex-1 flex flex-col">
                        <h3 class="text-sm font-bold text-slate-800 leading-tight mb-1 line-clamp-2">${product.name}</h3>
                        ${product.description ? `<p class="text-xs text-slate-500 line-clamp-2 mb-3">${product.description}</p>` : ''}
                        
                        <div class="mt-auto pt-3 flex items-center justify-between border-t border-slate-50">
                            <span class="text-base font-black text-indigo-600">৳ ${product.price}</span>
                            <button onclick="addToCart('${product.id}')" class="bg-slate-100 hover:bg-indigo-600 text-slate-600 hover:text-white h-9 w-9 rounded-full flex items-center justify-center transition-colors shadow-sm">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 3. ক্যাটাগরি তৈরি ও ফিল্টার
        function generateCategoryFilters() {
            const filterContainer = document.getElementById('categoryFilter');
            // ডুপ্লিকেট ক্যাটাগরি বাদ দিয়ে ইউনিক লিস্ট তৈরি
            const categories = [...new Set(products.map(p => p.category).filter(Boolean))];
            
            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'category-btn px-5 py-1.5 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full text-sm font-medium whitespace-nowrap transition-all';
                btn.innerText = category;
                btn.onclick = () => filterCategory(category, btn);
                filterContainer.appendChild(btn);
            });
        }

        function filterCategory(category, clickedBtn) {
            // বাটন স্টাইল আপডেট
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.className = 'category-btn px-5 py-1.5 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full text-sm font-medium whitespace-nowrap transition-all';
            });
            clickedBtn.className = 'category-btn px-5 py-1.5 bg-indigo-600 text-white rounded-full text-sm font-medium whitespace-nowrap shadow-md shadow-indigo-200 transition-all';

            // প্রোডাক্ট ফিল্টার
            filteredProducts = category === 'all' 
                ? [...products] 
                : products.filter(p => p.category === category);
            
            renderProducts(filteredProducts);
        }

        // 4. সার্চ ফাংশন
        function handleSearch(e) {
            const query = e.target.value.toLowerCase().trim();
            filteredProducts = products.filter(p => 
                p.name.toLowerCase().includes(query) || 
                (p.description && p.description.toLowerCase().includes(query)) ||
                (p.category && p.category.toLowerCase().includes(query))
            );
            renderProducts(filteredProducts);
        }

        // 5. কার্ট ম্যানেজমেন্ট
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if(!product) return;

            const existingItem = cart.find(item => item.id === id);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            saveCart();
            updateCartUI();
            showToast();
        }

        function updateQuantity(id, change) {
            const itemIndex = cart.findIndex(item => item.id === id);
            if (itemIndex > -1) {
                cart[itemIndex].quantity += change;
                if (cart[itemIndex].quantity <= 0) {
                    cart.splice(itemIndex, 1); // পরিমাণ ০ হলে মুছে ফেলবে
                }
                saveCart();
                updateCartUI();
            }
        }

        function removeProduct(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
            updateCartUI();
        }

        function saveCart() {
            localStorage.setItem('easyShopCart', JSON.stringify(cart));
        }

        // 6. কার্ট UI আপডেট
        function updateCartUI() {
            const container = document.getElementById('cartItems');
            let totalItems = 0;
            let totalPrice = 0;

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-400">
                        <i class="fas fa-shopping-cart text-5xl mb-4 opacity-30"></i>
                        <p class="font-medium text-sm">আপনার ব্যাগ সম্পূর্ণ খালি!</p>
                    </div>`;
            } else {
                container.innerHTML = cart.map(item => {
                    totalItems += item.quantity;
                    const itemTotal = parseFloat(item.price) * item.quantity;
                    totalPrice += itemTotal;
                    
                    return `
                        <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-100 flex gap-3 relative">
                            <img src="${item.image || 'https://via.placeholder.com/100'}" class="w-16 h-16 object-cover rounded-lg bg-slate-100">
                            <div class="flex-1 flex flex-col justify-center">
                                <h4 class="text-sm font-bold text-slate-800 leading-tight pr-6">${item.name}</h4>
                                <div class="text-xs text-slate-500 mt-1">৳ ${item.price} x ${item.quantity}</div>
                                <div class="flex items-center justify-between mt-2">
                                    <span class="text-sm font-black text-indigo-600">৳ ${itemTotal}</span>
                                    
                                    <div class="flex items-center bg-slate-100 rounded-lg border border-slate-200">
                                        <button onclick="updateQuantity('${item.id}', -1)" class="w-7 h-7 flex items-center justify-center text-slate-600 hover:text-rose-500 hover:bg-slate-200 rounded-l-lg transition-colors">-</button>
                                        <span class="w-6 text-center text-xs font-bold text-slate-800">${item.quantity}</span>
                                        <button onclick="updateQuantity('${item.id}', 1)" class="w-7 h-7 flex items-center justify-center text-slate-600 hover:text-indigo-600 hover:bg-slate-200 rounded-r-lg transition-colors">+</button>
                                    </div>
                                </div>
                            </div>
                            <button onclick="removeProduct('${item.id}')" class="absolute top-2 right-2 text-slate-300 hover:text-rose-500 transition-colors p-1">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </div>
                    `;
                }).join('');
            }

            document.getElementById('cartCount').innerText = totalItems;
            document.getElementById('cartTotal').innerText = `৳ ${totalPrice.toLocaleString('bn-BD')}`;
        }

        // 7. UI Controls (Sidebar & Toast)
        function toggleCart() {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('cartOverlay');
            
            sidebar.classList.toggle('translate-x-full');
            
            if (sidebar.classList.contains('translate-x-full')) {
                overlay.classList.remove('opacity-100');
                setTimeout(() => overlay.classList.add('hidden'), 300);
                document.body.style.overflow = ''; // Enable scrolling
            } else {
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 10);
                document.body.style.overflow = 'hidden'; // Disable body scroll
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 2500);
        }

        // 8. WhatsApp Checkout
        function checkoutViaWhatsApp() {
            if (cart.length === 0) return alert("অর্ডার করার জন্য কার্টে পণ্য যুক্ত করুন।");
            
            let message = "🛍️ *নতুন অর্ডার!*\n\n";
            let grandTotal = 0;

            cart.forEach((item, index) => {
                const itemTotal = parseFloat(item.price) * item.quantity;
                grandTotal += itemTotal;
                message += `${index + 1}. *${item.name}*\n   পরিমাণ: ${item.quantity} টি | দাম: ৳${itemTotal}\n`;
            });

            message += `\n💰 *সর্বমোট বিল: ৳${grandTotal}*\n\nআমি এই পণ্যগুলো অর্ডার করতে চাই।`;
            
            const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
